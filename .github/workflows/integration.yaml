name: ops Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '41 7 25 * *'

permissions: {}

jobs:
  integration:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        preset: ['k8s', 'machine']
        juju-channel:
          - 3/stable
          - 4.0/stable
          - 4.0/edge
          - 4.1/edge
        test:
          - test_direct_connection
          - test_with_tls
          - test_relation_units
          - test_secrets
          - test_hookcmds
        exclude:
          # tempo-coordinator-k8s only deploys on Kubernetes substrates.
          - preset: machine
            test: test_direct_connection
          - preset: machine
            test: test_with_tls

    steps:
      - run: sudo snap install --classic concierge
      - run: >
          sudo concierge prepare
          --juju-channel=${{ matrix.juju-channel }}
          -p "${{ matrix.preset }}"
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
      - run: uv tool install tox --with tox-uv
      - run: tox -e integration -- --log-cli-level=INFO -s -k "${{ matrix.test }}"
        timeout-minutes: 20  # Juju 4 gets stuck while destroying the model
